<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAC QUICK STATS // Live Match Analytics</title>
    <meta name="description" content="Real-time football match analytics and statistics dashboard by CAC">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --red: #D90429;
            --blue: #0077B6;
            --bg: #FFFFFF;
            --text: #000000;
            --muted: #888;
            --border: #000;
            --gray-light: #f5f5f5;
            --gray-200: #e5e7eb;
            --green: #16a34a;
            --yellow: #eab308;
            --orange: #ea580c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none; z-index: -1; opacity: 0.5;
        }

        /* Layout */
        .container { max-width: 480px; margin: 0 auto; padding: 16px; min-height: 100vh; position: relative; z-index: 1; }

        /* Terminal Box */
        .t-box {
            border: 2px solid var(--border);
            background: var(--bg);
            position: relative;
        }
        .t-shadow { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .t-shadow-lg { box-shadow: 6px 6px 0px 0px rgba(0,0,0,1); }

        /* Typography */
        .text-xs { font-size: 10px; } .text-sm { font-size: 12px; } .text-base { font-size: 14px; }
        .text-lg { font-size: 18px; } .text-xl { font-size: 24px; } .text-2xl { font-size: 32px; }
        .text-5xl { font-size: 56px; }
        .font-black { font-weight: 900; } .font-bold { font-weight: 700; }
        .uppercase { text-transform: uppercase; }
        .tracking-tight { letter-spacing: -0.02em; } .tracking-wide { letter-spacing: 0.05em; }
        .tracking-widest { letter-spacing: 0.1em; }
        .text-center { text-align: center; } .text-right { text-align: right; } .text-left { text-align: left; }
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .text-red { color: var(--red); } .text-blue { color: var(--blue); }
        .text-muted { color: var(--muted); } .text-green { color: var(--green); }

        /* Flexbox */
        .flex { display: flex; } .flex-col { flex-direction: column; }
        .items-center { align-items: center; } .items-start { align-items: start; } .items-end { align-items: flex-end; }
        .justify-center { justify-content: center; } .justify-between { justify-content: space-between; }
        .justify-around { justify-content: space-around; }
        .gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-6 { gap: 24px; }
        .flex-1 { flex: 1; } .flex-wrap { flex-wrap: wrap; }
        .w-full { width: 100%; }

        /* Spacing */
        .p-2 { padding: 8px; } .p-3 { padding: 12px; } .p-4 { padding: 16px; } .p-5 { padding: 20px; }
        .px-2 { padding-left: 8px; padding-right: 8px; } .px-3 { padding-left: 12px; padding-right: 12px; }
        .py-1 { padding-top: 4px; padding-bottom: 4px; } .py-2 { padding-top: 8px; padding-bottom: 8px; }
        .py-4 { padding-top: 16px; padding-bottom: 16px; }
        .mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; }
        .mb-4 { margin-bottom: 16px; } .mb-6 { margin-bottom: 24px; }
        .mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-4 { margin-top: 16px; }
        .pb-2 { padding-bottom: 8px; } .pb-12 { padding-bottom: 48px; }

        /* Grid */
        .grid { display: grid; } .grid-2 { grid-template-columns: 1fr 1fr; }

        /* Blink */
        @keyframes blink { 50% { opacity: 0; } }
        .blink { animation: blink 1s step-end infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }

        /* Stat bar */
        .stat-track { background: var(--gray-200); height: 8px; border: 1px solid #000; display: flex; overflow: hidden; }
        .stat-fill-red { background: var(--red); transition: width 1s ease; }
        .stat-fill-blue { background: var(--blue); transition: width 1s ease; border-left: 2px solid #000; }

        /* Buttons */
        .btn-back {
            background: none; border: none; cursor: pointer; font-family: inherit;
            font-size: 11px; font-weight: 900; text-transform: uppercase;
            letter-spacing: -0.02em; border-bottom: 2px solid #000; padding: 0 0 2px;
            color: #000;
        }
        .match-card {
            padding: 16px; cursor: pointer; transition: background 0.15s;
            margin-bottom: 12px;
        }
        .match-card:hover { background: #fafafa; }
        .match-card:active { box-shadow: none; transform: translate(2px, 2px); }
        .tournament-btn {
            width: 100%; text-align: left; padding: 16px; border: none; cursor: pointer;
            font-family: inherit; font-weight: 900; font-size: 13px; text-transform: uppercase;
            letter-spacing: -0.02em; transition: all 0.15s; display: flex;
            justify-content: space-between; align-items: center; background: white; color: black;
        }
        .tournament-btn:hover { background: #000; color: #fff; }
        .tournament-btn:active { box-shadow: none; transform: translate(2px, 2px); }

        /* Tabs */
        .tab-bar { display: flex; border-bottom: 2px solid #000; margin-bottom: 16px; overflow-x: auto; }
        .tab-btn {
            background: none; border: none; cursor: pointer; font-family: inherit;
            font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 8px 12px;
            letter-spacing: 0.05em; color: var(--muted); white-space: nowrap;
            border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
        }
        .tab-btn.active { color: #000; border-bottom-color: #000; }
        .tab-btn:hover { color: #000; }

        /* Pitch SVG */
        .pitch-wrap { width: 100%; aspect-ratio: 1.5; position: relative; }
        .pitch-wrap svg { width: 100%; height: 100%; }

        /* Momentum chart */
        .momentum-chart { width: 100%; height: 120px; }

        /* Timeline */
        .timeline-item {
            display: flex; gap: 8px; align-items: flex-start;
            padding: 8px 0; border-bottom: 1px solid var(--gray-200);
            font-size: 11px;
        }
        .timeline-badge {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0; border: 2px solid #000;
        }

        /* Splash */
        .splash {
            position: fixed; inset: 0; z-index: 100; background: white;
            display: flex; align-items: center; justify-content: center;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="grid-bg"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // =========================================
        // SUPABASE CLIENT
        // =========================================
        const SUPABASE_URL = "https://ircdnnvuavfbvjpifnho.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyY2RubnZ1YXZmYnZqcGlmbmhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjg0NzcsImV4cCI6MjA4NzY0NDQ3N30.zcrmFGmzZj7rEAs2U2dSAxnplCXyik5wMsCXrquOgkI";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // =========================================
        // HELPER: Box to X/Y (12 cols x 8 rows = 96, or 8x4=32)
        // =========================================
        function boxToXY(box, isFutsal = false) {
            const cols = isFutsal ? 8 : 12;
            const b = box - 1;
            return { col: b % cols, row: Math.floor(b / cols) };
        }

        // =========================================
        // STATS CALCULATOR
        // =========================================
        function computeStats(events, match) {
            const init = () => ({
                goals: 0, shots: 0, sot: 0,
                pass_total: 0, pass_success: 0,
                tackles: 0, tackle_success: 0,
                dribble_total: 0, dribble_success: 0,
                fouls: 0, yellow: 0, red: 0,
                carry: 0, own_goals: 0,
                corner_goals: 0, fk_goals: 0, penalty_goals: 0,
                events_count: 0,
                heatmap: {},
            });

            let home = init(), away = init();
            let maxMinute = 0;
            const keyEvents = [];
            const momentumBins = {};

            events.forEach(ev => {
                const isHome = ev.team_id === match.team_a_id;
                const t = isHome ? home : away;
                t.events_count++;

                if (ev.match_minute > maxMinute) maxMinute = ev.match_minute;

                // Heatmap
                if (ev.location_box) {
                    t.heatmap[ev.location_box] = (t.heatmap[ev.location_box] || 0) + 1;
                }

                // Momentum (5-min bins)
                const bin = Math.floor((ev.match_minute || 0) / 5) * 5;
                if (!momentumBins[bin]) momentumBins[bin] = { home: 0, away: 0 };
                const successOutcomes = ['Successful', 'Goal', 'Assist', 'SoT Save', 'SoT Block'];
                if (successOutcomes.includes(ev.outcome)) {
                    momentumBins[bin][isHome ? 'home' : 'away']++;
                }

                // Action-based stats
                switch (ev.action) {
                    case 'Pass':
                        t.pass_total++;
                        if (ev.outcome === 'Successful' || ev.outcome === 'Assist') t.pass_success++;
                        if (ev.outcome === 'Assist') {
                            keyEvents.push({ ...ev, display: 'Assist', emoji: '👟', isHome });
                        }
                        break;
                    case 'Shot':
                        t.shots++;
                        if (['Goal', 'SoT Save', 'SoT Block'].includes(ev.outcome)) t.sot++;
                        if (ev.outcome === 'Goal') {
                            t.goals++;
                            keyEvents.push({ ...ev, display: 'Goal', emoji: '⚽', isHome });
                            if (ev.type === 'Corner') t.corner_goals++;
                            if (ev.type === 'Free Kick') t.fk_goals++;
                            if (ev.type === 'Penalty') t.penalty_goals++;
                        }
                        break;
                    case 'Tackle':
                        t.tackles++;
                        if (ev.outcome === 'Successful') t.tackle_success++;
                        if (ev.outcome === 'Foul') t.fouls++;
                        if (ev.outcome === 'Yellow') {
                            t.yellow++;
                            keyEvents.push({ ...ev, display: 'Yellow Card', emoji: '🟨', isHome });
                        }
                        if (ev.outcome === 'Red') {
                            t.red++;
                            keyEvents.push({ ...ev, display: 'Red Card', emoji: '🟥', isHome });
                        }
                        break;
                    case 'Carry':
                        t.carry++;
                        break;
                    case 'Dribble':
                        t.dribble_total++;
                        if (ev.outcome === 'Successful') t.dribble_success++;
                        break;
                    case 'Own Goal':
                        t.own_goals++;
                        // Own goal counts for the OTHER team
                        if (isHome) away.goals++;
                        else home.goals++;
                        keyEvents.push({ ...ev, display: 'Own Goal', emoji: '🔴', isHome });
                        break;
                }
            });

            // Sort key events by timestamp
            keyEvents.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

            // Build momentum array
            const momentumData = [];
            for (let i = 0; i <= maxMinute; i += 5) {
                momentumData.push({
                    minute: i,
                    home: momentumBins[i]?.home || 0,
                    away: momentumBins[i]?.away || 0,
                });
            }

            const totalEvents = home.events_count + away.events_count;
            const possession = totalEvents === 0 ? 50 : Math.round((home.events_count / totalEvents) * 100);

            const pct = (n, d) => d === 0 ? 0 : Math.round((n / d) * 100);

            // Win Probability Algorithm (Zero-sum percentage shifting)
            let hProb = 50.0;
            let aProb = 50.0;
            const totalMins = match.is_futsal ? 40 : 90;
            const timePassed = Math.min(maxMinute, totalMins);

            events.forEach(ev => {
                const isHome = ev.team_id === match.team_a_id;
                let shift = 0;
                
                // Helper to check if event is in attacking 3rd
                const isInAttackingThird = (locBox) => {
                    if (!locBox) return false;
                    const { col } = boxToXY(locBox, match.is_futsal);
                    const cols = match.is_futsal ? 8 : 12;
                    if (isHome) return col >= cols - 3;
                    return col <= 2;
                };

                if (ev.outcome === 'Goal' && ev.action !== 'Own Goal') {
                    shift = 10.0;
                } else if (ev.action === 'Own Goal') {
                    // Own goal gives points to the OTHER team
                    if (isHome) aProb += 10.0, hProb -= 10.0; 
                    else hProb += 10.0, aProb -= 10.0;
                } else if (ev.outcome === 'Red') {
                    shift = -7.0; // penalizes the team
                } else if (ev.action === 'Shot') {
                    shift = 2.0; // +2% for any shot that isn't a goal
                } else if (ev.action === 'Pass' && ev.outcome === 'Successful') {
                    shift = isInAttackingThird(ev.location_box) ? 0.5 : 0.3;
                } else if (['Dribble', 'Carry'].includes(ev.action) && ev.outcome === 'Successful') {
                    if (isInAttackingThird(ev.location_box)) shift = 1.0; // +1% for attacking 3rd dribble/carry
                }

                if (shift !== 0) {
                    if (isHome) {
                        hProb += shift;
                        aProb -= shift;
                    } else {
                        aProb += shift;
                        hProb -= shift;
                    }
                }
            });

            // Adjust for winning team over time (0.3% increase per minute winning)
            const diff = home.goals - away.goals;
            if (diff > 0) {
                hProb += (timePassed * 0.3);
                aProb -= (timePassed * 0.3);
            } else if (diff < 0) {
                aProb += (timePassed * 0.3);
                hProb -= (timePassed * 0.3);
            }

            // Cap the percentages perfectly between 1 and 99 so it never breaks the UI
            hProb = Math.max(1, Math.min(99, Math.round(hProb)));
            aProb = 100 - hProb;

            return {
                home, away, maxMinute, keyEvents, momentumData, possession,
                passAccHome: pct(home.pass_success, home.pass_total),
                passAccAway: pct(away.pass_success, away.pass_total),
                shotAccHome: pct(home.sot, home.shots),
                shotAccAway: pct(away.sot, away.shots),
                tackleAccHome: pct(home.tackle_success, home.tackles),
                tackleAccAway: pct(away.tackle_success, away.tackles),
                dribbleAccHome: pct(home.dribble_success, home.dribble_total),
                dribbleAccAway: pct(away.dribble_success, away.dribble_total),
                winProbHome: hProb, winProbAway: aProb,
                isLive: match.status === 'Live',
            };
        }

        // =========================================
        // COMPONENTS: Gauges & Charts
        // =========================================
        function CircularGauge({ value, color, label, total }) {
            const r = 28, c = 2 * Math.PI * r;
            const offset = c - (value / 100) * c;
            return (
                <div style={{ textAlign: 'center' }}>
                    <div style={{ position: 'relative', width: 64, height: 64 }}>
                        <svg style={{ width: '100%', height: '100%', transform: 'rotate(-90deg)' }} viewBox="0 0 64 64">
                            <circle cx="32" cy="32" r={r} stroke="#e5e7eb" strokeWidth="4" fill="transparent" />
                            <circle cx="32" cy="32" r={r} stroke={color} strokeWidth="4" fill="transparent"
                                strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="square"
                                style={{ transition: 'stroke-dashoffset 1s ease' }} />
                        </svg>
                        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:900 }}>
                            {value}%
                        </div>
                    </div>
                    {total !== undefined && <div className="text-xs font-bold text-muted mt-1">{total} TOTAL</div>}
                </div>
            );
        }


        function TugOfWar({ label, home, away }) {
            return (
                <div className="mb-4">
                    <div className="flex justify-between mb-1 text-xs font-black uppercase tracking-tight">
                        <span className="text-red">{home}%</span>
                        <span className="text-muted tracking-widest">{label}</span>
                        <span className="text-blue">{away}%</span>
                    </div>
                    <div className="stat-track">
                        <div className="stat-fill-red" style={{ width: `${home}%` }}></div>
                        <div className="stat-fill-blue" style={{ width: `${away}%` }}></div>
                    </div>
                </div>
            );
        }

        function CompactStat({ label, homeVal, awayVal }) {
            return (
                <div className="flex justify-between text-sm font-bold py-1" style={{ borderBottom: '1px solid var(--gray-200)' }}>
                    <span className="font-black">{homeVal}</span>
                    <span className="text-muted text-xs uppercase tracking-wide">{label}</span>
                    <span className="font-black">{awayVal}</span>
                </div>
            );
        }

        function MomentumChart({ data, teamAName, teamBName }) {
            if (!data || data.length === 0) return null;
            const maxVal = Math.max(1, ...data.map(d => Math.max(d.home, d.away)));
            const barW = Math.max(12, (100 / data.length));

            return (
                <div className="t-box t-shadow p-3">
                    <div className="text-xs font-black uppercase tracking-widest text-muted mb-3">MATCH MOMENTUM</div>
                    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2, height: 80 }}>
                        {data.map((d, i) => {
                            const hH = (d.home / maxVal) * 60;
                            const aH = (d.away / maxVal) * 60;
                            return (
                                <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1 }}>
                                    <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', height: 60, width: '100%', gap: 1 }}>
                                        <div style={{ height: hH, background: 'var(--red)', transition: 'height 0.5s', minHeight: d.home > 0 ? 2 : 0 }}></div>
                                        <div style={{ height: aH, background: 'var(--blue)', transition: 'height 0.5s', minHeight: d.away > 0 ? 2 : 0 }}></div>
                                    </div>
                                    <div className="text-xs text-muted" style={{ fontSize: 7 }}>{d.minute}'</div>
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex justify-between mt-2 text-xs font-bold">
                        <span className="text-red">■ {teamAName}</span>
                        <span className="text-blue">■ {teamBName}</span>
                    </div>
                </div>
            );
        }

        function ShotMap({ events, match }) {
            const shots = events.filter(e => e.action === 'Shot' && e.location_box);
            if (shots.length === 0) return null;
            const isFutsal = match.is_futsal;
            const cols = isFutsal ? 8 : 12;
            const rows = isFutsal ? 4 : 8;
            const vW = 600, vH = isFutsal ? 300 : 400;
            const bW = vW / cols, bH = vH / rows;

            return (
                <div className="t-box t-shadow p-3">
                    <div className="text-xs font-black uppercase tracking-widest text-muted mb-3">SHOT MAP</div>
                    <div className="pitch-wrap">
                        <svg viewBox={`0 0 ${vW} ${vH}`} preserveAspectRatio="xMidYMid meet">
                            <rect x="0" y="0" width={vW} height={vH} fill="#fff" rx="2" stroke="#000" strokeWidth="2" />
                            <line x1={vW/2} y1="0" x2={vW/2} y2={vH} stroke="#ddd" strokeWidth="1" />
                            <circle cx={vW/2} cy={vH/2} r={isFutsal ? 40 : 55} fill="none" stroke="#ddd" strokeWidth="1" />
                            {shots.map((s, i) => {
                                const { col, row } = boxToXY(s.location_box, isFutsal);
                                const cx = col * bW + bW / 2;
                                const cy = row * bH + bH / 2;
                                const isHome = s.team_id === match.team_a_id;
                                let fill = '#999';
                                if (s.outcome === 'Goal') fill = 'var(--green)';
                                else if (['SoT Save', 'SoT Block'].includes(s.outcome)) fill = isHome ? 'var(--red)' : 'var(--blue)';
                                else fill = '#ccc';
                                return (
                                    <g key={i}>
                                        <circle cx={cx} cy={cy} r={s.outcome === 'Goal' ? 10 : 7} fill={fill} stroke="#000" strokeWidth="1.5" opacity="0.85" />
                                        {s.outcome === 'Goal' && <text x={cx} y={cy+4} textAnchor="middle" fontSize="10" fontWeight="900" fill="#fff">G</text>}
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                    <div className="flex justify-around text-xs font-bold mt-2">
                        <span><span style={{display:'inline-block', width:10, height:10, background:'var(--green)', border:'1px solid #000', marginRight:4, verticalAlign:'middle'}}></span>GOAL</span>
                        <span><span style={{display:'inline-block', width:10, height:10, background:'var(--red)', border:'1px solid #000', marginRight:4, verticalAlign:'middle'}}></span>ON TARGET</span>
                        <span><span style={{display:'inline-block', width:10, height:10, background:'#ccc', border:'1px solid #000', marginRight:4, verticalAlign:'middle'}}></span>OFF/BLOCKED</span>
                    </div>
                </div>
            );
        }

        function Heatmap({ events, match, teamId, teamName, color }) {
            const teamEvents = events.filter(e => e.team_id === teamId && e.location_box);
            if (teamEvents.length === 0) return null;
            const isFutsal = match.is_futsal;
            const cols = isFutsal ? 8 : 12;
            const rows = isFutsal ? 4 : 8;
            const totalBoxes = cols * rows;
            const vW = 600, vH = isFutsal ? 300 : 400;
            const bW = vW / cols, bH = vH / rows;

            const counts = {};
            teamEvents.forEach(e => { counts[e.location_box] = (counts[e.location_box] || 0) + 1; });
            const maxCount = Math.max(1, ...Object.values(counts));

            return (
                <div>
                    <div className="text-xs font-black uppercase tracking-tight mb-2" style={{ color }}>{teamName}</div>
                    <div className="pitch-wrap">
                        <svg viewBox={`0 0 ${vW} ${vH}`} preserveAspectRatio="xMidYMid meet">
                            <rect x="0" y="0" width={vW} height={vH} fill="#fff" rx="2" stroke="#000" strokeWidth="2" />
                            {Array.from({length: totalBoxes}, (_, i) => {
                                const box = i + 1;
                                const col = i % cols, row = Math.floor(i / cols);
                                const count = counts[box] || 0;
                                const intensity = count / maxCount;
                                return (
                                    <rect key={box} x={col*bW} y={row*bH} width={bW} height={bH}
                                        fill={count > 0 ? color : 'transparent'}
                                        opacity={count > 0 ? 0.15 + intensity * 0.7 : 0}
                                        stroke="#eee" strokeWidth="0.5" />
                                );
                            })}
                            <line x1={vW/2} y1="0" x2={vW/2} y2={vH} stroke="rgba(0,0,0,0.15)" strokeWidth="1" />
                            <circle cx={vW/2} cy={vH/2} r={isFutsal?40:55} fill="none" stroke="rgba(0,0,0,0.1)" strokeWidth="1" />
                        </svg>
                    </div>
                </div>
            );
        }

        function KeyTimeline({ keyEvents, match }) {
            if (keyEvents.length === 0) return <div className="text-xs text-muted uppercase font-bold p-3">No key events yet</div>;
            return (
                <div className="t-box t-shadow p-3">
                    <div className="text-xs font-black uppercase tracking-widest text-muted mb-3">KEY EVENTS</div>
                    {keyEvents.map((ev, i) => {
                        const teamName = ev.isHome ? match.team_a?.name : match.team_b?.name;
                        const min = ev.match_minute || Math.floor((ev.timestamp || 0) / 60);
                        return (
                            <div key={i} className="timeline-item">
                                <div className="timeline-badge" style={{
                                    background: ev.display === 'Goal' ? 'var(--green)' : ev.display === 'Red Card' ? 'var(--red)' : ev.display === 'Yellow Card' ? 'var(--yellow)' : '#eee',
                                    color: ['Goal','Red Card'].includes(ev.display) ? '#fff' : '#000',
                                }}>
                                    {ev.emoji}
                                </div>
                                <div style={{ flex: 1 }}>
                                    <div className="font-black uppercase text-xs">{ev.display}</div>
                                    <div className="text-xs text-muted">
                                        {teamName} • {min}' {ev.player_name ? `• ${ev.player_name}` : ''} {ev.jersey_number ? `#${ev.jersey_number}` : ''}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function PlayerTable({ keyEvents, match }) {
            const scorers = {};
            const assists = {};
            const cards = {};
            keyEvents.forEach(ev => {
                const name = ev.player_name || 'Unknown';
                const team = ev.isHome ? match.team_a?.name : match.team_b?.name;
                const key = `${name}|${team}`;
                if (ev.display === 'Goal' || ev.display === 'Own Goal') {
                    if (!scorers[key]) scorers[key] = { name, team, count: 0, isOG: ev.display === 'Own Goal' };
                    scorers[key].count++;
                }
                if (ev.display === 'Assist') {
                    if (!assists[key]) assists[key] = { name, team, count: 0 };
                    assists[key].count++;
                }
                if (ev.display === 'Yellow Card' || ev.display === 'Red Card') {
                    if (!cards[key]) cards[key] = { name, team, yellow: 0, red: 0 };
                    if (ev.display === 'Yellow Card') cards[key].yellow++;
                    else cards[key].red++;
                }
            });

            const scorerList = Object.values(scorers).sort((a,b) => b.count - a.count);
            const assistList = Object.values(assists).sort((a,b) => b.count - a.count);
            const cardList = Object.values(cards);

            if (scorerList.length === 0 && assistList.length === 0 && cardList.length === 0) return null;

            return (
                <div className="t-box t-shadow p-3">
                    <div className="text-xs font-black uppercase tracking-widest text-muted mb-3">PLAYER STATS</div>
                    {scorerList.length > 0 && (
                        <div className="mb-3">
                            <div className="text-xs font-black uppercase mb-1" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>⚽ SCORERS</div>
                            {scorerList.map((s, i) => (
                                <div key={i} className="flex justify-between text-xs font-bold py-1">
                                    <span>{s.name} <span className="text-muted">({s.team})</span>{s.isOG ? ' (OG)' : ''}</span>
                                    <span className="font-black">{s.count}</span>
                                </div>
                            ))}
                        </div>
                    )}
                    {assistList.length > 0 && (
                        <div className="mb-3">
                            <div className="text-xs font-black uppercase mb-1" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>👟 ASSISTS</div>
                            {assistList.map((a, i) => (
                                <div key={i} className="flex justify-between text-xs font-bold py-1">
                                    <span>{a.name} <span className="text-muted">({a.team})</span></span>
                                    <span className="font-black">{a.count}</span>
                                </div>
                            ))}
                        </div>
                    )}
                    {cardList.length > 0 && (
                        <div>
                            <div className="text-xs font-black uppercase mb-1" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>🟨 DISCIPLINE</div>
                            {cardList.map((c, i) => (
                                <div key={i} className="flex justify-between text-xs font-bold py-1">
                                    <span>{c.name} <span className="text-muted">({c.team})</span></span>
                                    <span>{c.yellow > 0 && `🟨${c.yellow}`} {c.red > 0 && `🟥${c.red}`}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // =========================================
        // SCREENS
        // =========================================
        function SplashScreen() {
            return (
                <div className="splash">
                    <div className="t-box t-shadow-lg p-5" style={{ maxWidth: 320, width: '90%', textAlign: 'center' }}>
                        <div className="text-xs font-black uppercase text-muted tracking-widest mb-4">SESSION START UP</div>
                        <div className="text-xs font-black uppercase tracking-widest mb-2" style={{ opacity: 0.6 }}>WELCOME TO</div>
                        <div className="mb-4">
                            <div className="text-5xl font-black uppercase tracking-tight text-red" style={{ lineHeight: 1 }}>CAC</div>
                            <div className="text-lg font-black uppercase tracking-widest mt-1">QUICK STATS</div>
                        </div>
                        <div style={{ height: 4, background: '#000', width: '100%', marginBottom: 16 }}></div>
                        <div className="text-xs font-bold uppercase tracking-widest animate-pulse">ESTABLISHING DATA LINK...</div>
                    </div>
                </div>
            );
        }

        function HubScreen({ onSelect }) {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                db.from('tournaments').select('*').eq('Is_visible', true).then(({ data }) => {
                    setItems(data || []);
                    setLoading(false);
                });
            }, []);

            if (loading) return <div className="text-xs font-bold uppercase tracking-widest animate-pulse">ESTABLISHING CONNECTION...</div>;

            return (
                <div>
                    <div className="text-xs font-bold text-muted uppercase mb-3">AVAILABLE TOURNAMENTS</div>
                    {items.length === 0 && <div className="text-xs text-muted uppercase font-bold">No tournaments available</div>}
                    {items.map((t, i) => (
                        <div key={t.id} className="t-box t-shadow mb-3">
                            <button className="tournament-btn" onClick={() => onSelect(t)}>
                                <span>[{String(i + 1).padStart(2, '0')}] {t.name}</span>
                                <span>→</span>
                            </button>
                        </div>
                    ))}
                </div>
            );
        }

        function MatchListScreen({ tournament, onSelect, onBack }) {
            const [matches, setMatches] = useState([]);
            const [loading, setLoading] = useState(true);

            const fetchData = async () => {
                const { data } = await db.from('matches')
                    .select('*, team_a:teams!team_a_id(*), team_b:teams!team_b_id(*)')
                    .eq('tournament_id', tournament.id)
                    .in('status', ['Live', 'Finished', 'Published'])
                    .order('start_time', { ascending: false });
                setMatches(data || []);
                setLoading(false);
            };

            useEffect(() => {
                fetchData();
                const channel = db.channel('match-list-rt')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'matches' }, fetchData)
                    .subscribe();
                const interval = setInterval(fetchData, 15000);
                return () => { db.removeChannel(channel); clearInterval(interval); };
            }, [tournament.id]);

            return (
                <div>
                    <div className="flex justify-between items-end gap-2 mb-4">
                        <button className="btn-back" onClick={onBack}>← BACK TO HUB</button>
                        <div className="font-black uppercase text-xs px-2 py-1" style={{ background: '#000', color: '#fff', maxWidth: '60%' }}>
                            <span className="truncate" style={{ display: 'block' }}>{tournament.name}</span>
                        </div>
                    </div>
                    {loading ? (
                        <div className="text-xs font-bold animate-pulse uppercase">RETRIEVING MATCH DATA...</div>
                    ) : matches.length === 0 ? (
                        <div className="text-xs text-muted uppercase font-bold">No matches available yet</div>
                    ) : matches.map(m => {
                        const isLive = m.status === 'Live';
                        const hasScore = m.team_a_score !== null && m.team_b_score !== null;
                        return (
                            <div key={m.id} className="t-box t-shadow match-card" onClick={() => onSelect(m)}>
                                <div className="flex justify-between mb-2 items-center">
                                    {isLive ? (
                                        <span className="text-red font-black text-xs blink">[ LIVE ]</span>
                                    ) : (
                                        <span className="text-muted font-black text-xs">[ {m.status?.toUpperCase() || 'FINAL'} ]</span>
                                    )}
                                    {m.is_futsal && <span className="text-xs font-bold text-muted">FUTSAL</span>}
                                </div>

                                <div className="flex justify-between items-center font-black text-base pb-2 gap-2" style={{ borderBottom: '2px solid #000' }}>
                                    <span className="flex-1 text-left truncate uppercase" style={{ lineHeight: 1.2 }}>{m.team_a?.name}</span>
                                    {hasScore ? (
                                        <span style={{ fontFamily: 'JetBrains Mono', fontSize: 22, fontWeight: 900, letterSpacing: 2 }}>
                                            <span className="text-red">{m.team_a_score}</span>
                                            <span className="text-muted" style={{ margin: '0 4px' }}>:</span>
                                            <span className="text-blue">{m.team_b_score}</span>
                                        </span>
                                    ) : (
                                        <span className="text-xs font-bold px-2 py-1" style={{ background: '#000', color: '#fff' }}>VS</span>
                                    )}
                                    <span className="flex-1 text-right truncate uppercase" style={{ lineHeight: 1.2 }}>{m.team_b?.name}</span>
                                </div>

                                <div className="flex justify-between mt-2 items-center">
                                    <span className="text-muted text-xs font-bold uppercase">{m.details ? m.details.toUpperCase() : ''}</span>
                                    <span className="text-xs font-black uppercase tracking-tight">ENTER →</span>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // =========================================
        // DASHBOARD
        // =========================================
        function Dashboard({ match: initialMatch, onBack }) {
            const [match, setMatch] = useState(initialMatch);
            const [events, setEvents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('overview');

            const fetchEvents = async () => {
                const { data } = await db.from('events').select('*')
                    .eq('match_id', initialMatch.id)
                    .order('timestamp', { ascending: true });
                setEvents(data || []);
                setLoading(false);
            };

            const fetchMatch = async () => {
                const { data } = await db.from('matches')
                    .select('*, team_a:teams!team_a_id(*), team_b:teams!team_b_id(*)')
                    .eq('id', initialMatch.id).single();
                if (data) setMatch(data);
            };

            useEffect(() => {
                fetchEvents();
                fetchMatch();
                const channel = db.channel(`dash-${initialMatch.id}`)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'events', filter: `match_id=eq.${initialMatch.id}` }, fetchEvents)
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'matches', filter: `id=eq.${initialMatch.id}` }, fetchMatch)
                    .subscribe();
                const interval = setInterval(() => { fetchEvents(); fetchMatch(); }, 10000);
                return () => { db.removeChannel(channel); clearInterval(interval); };
            }, [initialMatch.id]);

            const stats = useMemo(() => computeStats(events, match), [events, match]);

            if (loading) return <div className="text-xs font-bold animate-pulse uppercase">SYNCHRONIZING FEED...</div>;

            const teamAName = match.team_a?.name || 'Team A';
            const teamBName = match.team_b?.name || 'Team B';

            // Always compute score from events, not match table
            const scoreA = stats.home.goals;
            const scoreB = stats.away.goals;

            const tabs = ['overview', 'shots', 'heatmap', 'timeline', 'players'];

            return (
                <div className="pb-12">
                    {/* Header */}
                    <div className="flex justify-between items-start mb-4">
                        <button className="btn-back" onClick={onBack}>← BACK</button>
                        <div className="text-right">
                            <div className="text-xs font-black px-2 py-1 flex items-center gap-1" style={{ background: '#000', color: '#fff' }}>
                                TIME: {stats.maxMinute}'
                                {stats.isLive && <span className="blink" style={{ width: 6, height: 12, display: 'inline-block', background: '#fff' }}></span>}
                            </div>
                            {match.details && <div className="text-xs font-black text-muted uppercase mt-1">{match.details.toUpperCase()}</div>}
                        </div>
                    </div>

                    {/* Scoreboard */}
                    <div className="t-box t-shadow-lg py-4 mb-6" style={{ background: 'var(--gray-light)' }}>
                        <div className="flex justify-between items-center px-4">
                            <div className="flex-1 text-center" style={{ minWidth: 0 }}>
                                <div style={{ fontSize: 52, fontWeight: 900, lineHeight: 1 }} className="text-red">{scoreA}</div>
                                <div className="text-xs font-black uppercase tracking-tight mt-2 truncate w-full">{teamAName}</div>
                            </div>
                            <div className="px-3 text-center flex flex-col items-center">
                                <div className="text-muted" style={{ fontSize: 32, opacity: 0.2, lineHeight: 1 }}>:</div>
                                <div className="text-muted font-bold text-[10px] mt-2 tracking-widest bg-white border border-black px-2 py-0.5" style={{ borderRadius: 2 }}>
                                    {stats.isLive ? 'LIVE' : 'FINAL'}
                                </div>
                            </div>
                            <div className="flex-1 text-center" style={{ minWidth: 0 }}>
                                <div style={{ fontSize: 52, fontWeight: 900, lineHeight: 1 }} className="text-blue">{scoreB}</div>
                                <div className="text-xs font-black uppercase tracking-tight mt-2 truncate w-full">{teamBName}</div>
                            </div>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="tab-bar">
                        {tabs.map(tab => (
                            <button key={tab} className={`tab-btn ${activeTab === tab ? 'active' : ''}`} onClick={() => setActiveTab(tab)}>
                                {tab}
                            </button>
                        ))}
                    </div>

                    {/* Tab Content */}
                    {activeTab === 'overview' && (
                        <div>
                            <div className="t-box t-shadow p-4 mb-4">
                                {stats.isLive && (
                                    <TugOfWar label="WIN PROBABILITY" home={stats.winProbHome} away={stats.winProbAway} />
                                )}
                                <TugOfWar label="POSSESSION" home={stats.possession} away={100 - stats.possession} />
                                <TugOfWar label="PASS ACCURACY" home={stats.passAccHome} away={stats.passAccAway} />
                                <TugOfWar label="SHOT ACCURACY" home={stats.shotAccHome} away={stats.shotAccAway} />
                                {(stats.home.tackles > 0 || stats.away.tackles > 0) && (
                                    <TugOfWar label="TACKLE SUCCESS" home={stats.tackleAccHome} away={stats.tackleAccAway} />
                                )}
                            </div>

                            {/* Shooting & Passing Gauges */}
                            <div className="grid grid-2 gap-3 mb-4">
                                <div className="t-box p-3 text-center" style={{ background: 'var(--gray-light)' }}>
                                    <div className="flex justify-around mb-2">
                                        <CircularGauge value={stats.shotAccHome} color="var(--red)" total={stats.home.shots} />
                                        <CircularGauge value={stats.shotAccAway} color="var(--blue)" total={stats.away.shots} />
                                    </div>
                                    <div className="text-xs font-black uppercase tracking-tight" style={{ borderTop: '1px solid var(--gray-200)', paddingTop: 8 }}>SHOT ACCURACY</div>
                                </div>
                                <div className="t-box p-3 text-center" style={{ background: 'var(--gray-light)' }}>
                                    <div className="flex justify-around mb-2">
                                        <CircularGauge value={stats.passAccHome} color="var(--red)" total={stats.home.pass_total} />
                                        <CircularGauge value={stats.passAccAway} color="var(--blue)" total={stats.away.pass_total} />
                                    </div>
                                    <div className="text-xs font-black uppercase tracking-tight" style={{ borderTop: '1px solid var(--gray-200)', paddingTop: 8 }}>PASS ACCURACY</div>
                                </div>
                            </div>

                            {/* Compact Stats */}
                            <div className="grid grid-2 gap-3 mb-4">
                                <div className="t-box p-3">
                                    <div className="text-xs font-black uppercase mb-2" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>ATTACK</div>
                                    <CompactStat label="SHOTS" homeVal={stats.home.shots} awayVal={stats.away.shots} />
                                    <CompactStat label="ON TARGET" homeVal={stats.home.sot} awayVal={stats.away.sot} />
                                    <CompactStat label="PASSES" homeVal={stats.home.pass_total} awayVal={stats.away.pass_total} />
                                    <CompactStat label="CARRIES" homeVal={stats.home.carry} awayVal={stats.away.carry} />
                                    <CompactStat label="DRIBBLES" homeVal={stats.home.dribble_total} awayVal={stats.away.dribble_total} />
                                </div>
                                <div className="t-box p-3">
                                    <div className="text-xs font-black uppercase mb-2" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>DEFENSE</div>
                                    <CompactStat label="TACKLES" homeVal={stats.home.tackles} awayVal={stats.away.tackles} />
                                    <CompactStat label="FOULS" homeVal={stats.home.fouls} awayVal={stats.away.fouls} />
                                    <CompactStat label="YELLOW" homeVal={stats.home.yellow} awayVal={stats.away.yellow} />
                                    <CompactStat label="RED" homeVal={stats.home.red} awayVal={stats.away.red} />
                                    {(stats.home.corner_goals + stats.away.corner_goals + stats.home.fk_goals + stats.away.fk_goals + stats.home.penalty_goals + stats.away.penalty_goals > 0) && (
                                        <CompactStat label="SET PIECE ⚽" homeVal={stats.home.corner_goals + stats.home.fk_goals + stats.home.penalty_goals} awayVal={stats.away.corner_goals + stats.away.fk_goals + stats.away.penalty_goals} />
                                    )}
                                </div>
                            </div>

                            <MomentumChart data={stats.momentumData} teamAName={teamAName} teamBName={teamBName} />
                        </div>
                    )}

                    {activeTab === 'shots' && (
                        <ShotMap events={events} match={match} />
                    )}

                    {activeTab === 'heatmap' && (
                        <div className="t-box t-shadow p-3">
                            <div className="text-xs font-black uppercase tracking-widest text-muted mb-3">ACTION HEATMAPS</div>
                            <Heatmap events={events} match={match} teamId={match.team_a_id} teamName={teamAName} color="var(--red)" />
                            <div style={{ height: 16 }}></div>
                            <Heatmap events={events} match={match} teamId={match.team_b_id} teamName={teamBName} color="var(--blue)" />
                        </div>
                    )}

                    {activeTab === 'timeline' && (
                        <KeyTimeline keyEvents={stats.keyEvents} match={match} />
                    )}

                    {activeTab === 'players' && (
                        <PlayerTable keyEvents={stats.keyEvents} match={match} />
                    )}
                </div>
            );
        }

        // =========================================
        // APP ROOT
        // =========================================
        function App() {
            const [view, setView] = useState('hub');
            const [selectedTournament, setSelectedTournament] = useState(null);
            const [selectedMatch, setSelectedMatch] = useState(null);
            const [showSplash, setShowSplash] = useState(true);

            useEffect(() => {
                const timer = setTimeout(() => setShowSplash(false), 2500);
                return () => clearTimeout(timer);
            }, []);

            if (showSplash) return <SplashScreen />;

            return (
                <div className="container">
                    <header className="flex justify-between items-center mb-6 pb-2" style={{ borderBottom: '2px solid #000' }}>
                        <div className="text-xs font-black uppercase tracking-tight">
                            CAC QUICK STATS <span className="text-muted">// ANALYTICS</span>
                        </div>
                        <a href="https://pp33.carrd.co" target="_blank" rel="noopener noreferrer"
                            className="text-xs font-bold uppercase tracking-tight px-2 py-1"
                            style={{ border: '1px solid #000', textDecoration: 'none', color: '#000', transition: 'all 0.15s' }}
                            onMouseOver={e => { e.target.style.background='#000'; e.target.style.color='#fff'; }}
                            onMouseOut={e => { e.target.style.background='transparent'; e.target.style.color='#000'; }}>
                            Made by PP33
                        </a>
                    </header>

                    {view === 'hub' && (
                        <HubScreen onSelect={(t) => { setSelectedTournament(t); setView('matches'); }} />
                    )}
                    {view === 'matches' && (
                        <MatchListScreen
                            tournament={selectedTournament}
                            onSelect={(m) => { setSelectedMatch(m); setView('dashboard'); }}
                            onBack={() => setView('hub')}
                        />
                    )}
                    {view === 'dashboard' && (
                        <Dashboard
                            match={selectedMatch}
                            onBack={() => setView('matches')}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
